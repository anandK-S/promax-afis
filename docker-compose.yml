# ========================================
# Pro-Max AFIS - Docker Compose Configuration
# ========================================
# Production-ready multi-container orchestration
# Author: Pro-Max Development Team
# Version: 1.0.0

version: '3.8'

services:
  # ========================================
  # PostgreSQL Database with TimescaleDB
  # ========================================
  postgres:
    image: timescale/timescaledb:latest-pg15
    container_name: promax-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: promax_db
      POSTGRES_INITDB_ARGS: "-E UTF8"
      TIMESCALEDB_TELEMETRY: "off"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/init-scripts:/docker-entrypoint-initdb.d
    networks:
      - promax-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ========================================
  # Redis - Caching & Message Broker
  # ========================================
  redis:
    image: redis:7.2-alpine
    container_name: promax-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - promax-network
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # ========================================
  # FastAPI Backend Application
  # ========================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: promax-backend
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/promax_db
      - REDIS_URL=redis://redis:6379/0
      - REDIS_CACHE_URL=redis://redis:6379/1
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - ENVIRONMENT=production
      - DEBUG=False
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./ml-models:/app/ml-models
      - backend_logs:/app/logs
    networks:
      - promax-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped

  # ========================================
  # Celery Worker - Background Tasks
  # ========================================
  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: promax-celery-worker
    command: celery -A app.tasks.celery_app worker --loglevel=info --concurrency=4
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/promax_db
      - REDIS_URL=redis://redis:6379/2
      - CELERY_BROKER_URL=redis://redis:6379/2
      - CELERY_RESULT_BACKEND=redis://redis:6379/3
      - ENVIRONMENT=production
    volumes:
      - ./backend:/app
      - ./ml-models:/app/ml-models
      - backend_logs:/app/logs
    networks:
      - promax-network
    depends_on:
      - postgres
      - redis
    restart: unless-stopped

  # ========================================
  # Celery Beat - Task Scheduler
  # ========================================
  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: promax-celery-beat
    command: celery -A app.tasks.celery_app beat --loglevel=info
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/promax_db
      - REDIS_URL=redis://redis:6379/2
      - CELERY_BROKER_URL=redis://redis:6379/2
      - CELERY_RESULT_BACKEND=redis://redis:6379/3
      - ENVIRONMENT=production
    volumes:
      - ./backend:/app
      - ./ml-models:/app/ml-models
      - backend_logs:/app/logs
    networks:
      - promax-network
    depends_on:
      - postgres
      - redis
    restart: unless-stopped

  # ========================================
  # Flower - Celery Monitoring
  # ========================================
  flower:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: promax-flower
    command: celery -A app.tasks.celery_app flower --port=5555
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/2
      - CELERY_RESULT_BACKEND=redis://redis:6379/3
    ports:
      - "5555:5555"
    networks:
      - promax-network
    depends_on:
      - redis
    restart: unless-stopped

  # ========================================
  # React Frontend Application
  # ========================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: promax-frontend
    ports:
      - "3000:80"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - promax-network
    depends_on:
      - backend
    restart: unless-stopped

  # ========================================
  # Nginx - Reverse Proxy & Load Balancer
  # ========================================
  nginx:
    image: nginx:alpine
    container_name: promax-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    networks:
      - promax-network
    depends_on:
      - backend
      - frontend
    restart: unless-stopped

# ========================================
# Networks Configuration
# ========================================
networks:
  promax-network:
    driver: bridge
    name: promax-network

# ========================================
# Volumes Configuration
# ========================================
volumes:
  postgres_data:
    driver: local
    name: promax-postgres-data
  redis_data:
    driver: local
    name: promax-redis-data
  backend_logs:
    driver: local
    name: promax-backend-logs